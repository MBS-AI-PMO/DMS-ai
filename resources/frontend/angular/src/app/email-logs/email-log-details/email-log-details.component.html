<div class="dms-form-dialog__shell">
  <div class="dms-form-dialog__header">
    <div class="dms-form-dialog__heading">
      <h2 class="dms-form-dialog__title">{{ 'EMAIL_LOG_DETAIL' | translate }}</h2>
    </div>
    <button type="button" class="dms-form-dialog__close" (click)="close()" [attr.aria-label]="'CANCEL' | translate">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <mat-dialog-content class="dms-form-dialog__body">
    <div class="dms-form-dialog__form-card">
      <div class="dms-form-dialog__detail-grid">
        <div class="dms-form-dialog__field dms-form-dialog__field--full">
          <label class="form-label">{{ 'DATE' | translate }}</label>
          <span class="dms-form-dialog__detail-value">{{ data.sentAt | utcToLocalTime:'short' }}</span>
        </div>

        <div class="dms-form-dialog__field">
          <label class="form-label">{{ 'FROM' | translate }}</label>
          <span class="dms-form-dialog__detail-value">{{ data.senderEmail }}</span>
        </div>

        <div class="dms-form-dialog__field">
          <label class="form-label">{{ 'TO' | translate }}</label>
          <span class="dms-form-dialog__detail-value">{{ data.recipientEmail }}</span>
        </div>

        <div class="dms-form-dialog__field dms-form-dialog__field--full">
          <label class="form-label">{{ 'SUBJECT' | translate }}</label>
          <span class="dms-form-dialog__detail-value">{{ data.subject }}</span>
        </div>

        <div class="dms-form-dialog__field dms-form-dialog__field--full">
          <label class="form-label">{{ 'BODY' | translate }}</label>
          <div class="dms-form-dialog__detail-body" [innerHTML]="data.body"></div>
        </div>

        <div class="dms-form-dialog__field">
          <label class="form-label">{{ 'STATUS' | translate }}</label>
          <span *ngIf="data?.status.toLocaleLowerCase() == 'sent'" class="badge bg-success">{{ 'SUCCESS' | translate }}</span>
          <span *ngIf="data?.status.toLocaleLowerCase() == 'failed'" class="badge bg-danger">{{ 'FAILED' | translate }}</span>
        </div>

        <div class="dms-form-dialog__field" *ngIf="data?.emailLogAttachments?.length > 0">
          <label class="form-label">{{ 'ATTACHMENTS' | translate }}</label>
          <div class="dms-form-dialog__detail-value" *ngFor="let attachment of data.emailLogAttachments">
            <a class="link-primary">{{ attachment.name }}</a>
            <span (click)="downloadAttachment(attachment)">
              <i-feather name="download" class="small-icon text-success ms-2 cursor-pointer"></i-feather>
            </span>
          </div>
        </div>

        <div class="dms-form-dialog__field dms-form-dialog__field--full" *ngIf="data.errorMessage">
          <label class="form-label">{{ 'ERROR' | translate }}</label>
          <span class="dms-form-dialog__detail-value text-danger">{{ data.errorMessage }}</span>
        </div>
      </div>
    </div>
  </mat-dialog-content>

  <div mat-dialog-actions class="dms-form-dialog__actions">
    <button type="button" class="dms-form-dialog__btn dms-form-dialog__btn--cancel" (click)="close()">
      <i-feather name="x-circle"></i-feather>
      {{ 'CANCEL' | translate }}
    </button>
  </div>
</div>
