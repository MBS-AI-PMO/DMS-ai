<div class="dms-form-dialog__shell">
  <div class="dms-form-dialog__header">
    <div class="dms-form-dialog__heading">
      <mat-icon class="dms-form-dialog__icon">folder</mat-icon>
      <div class="min-w-0">
        <h2 class="dms-form-dialog__title">{{ data.name }} — {{ 'COMMENT' | translate }}</h2>
      </div>
      <app-page-help-text [code]="'DOCUMENT_COMMENTS'"></app-page-help-text>
    </div>
    <button type="button" class="dms-form-dialog__close" (click)="closeDialog()" [attr.aria-label]="'CANCEL' | translate">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <mat-dialog-content class="dms-form-dialog__body">
    <div class="dms-form-dialog__form-card">
    <div class="dms-form-dialog__comments" *ngIf="documentComments?.length">
      <div class="dms-form-dialog__comment-item" *ngFor="let documentComment of documentComments">
        <p class="dms-form-dialog__comment-text">{{ documentComment.comment }}</p>
        <div class="dms-form-dialog__comment-meta">
          <span>{{ documentComment.createdDate | utcToLocalTime: 'short' }}</span>
          <span class="dms-form-dialog__comment-author">{{ documentComment?.createdByName }}</span>
          <button type="button" class="dms-form-dialog__comment-delete" (click)="onDelete(documentComment.id)"
            [attr.aria-label]="'DELETE' | translate">
            <i-feather name="trash" class="small-icon"></i-feather>
          </button>
        </div>
      </div>
    </div>

    <form [formGroup]="commentForm">
      <div class="dms-form-dialog__field dms-form-dialog__field--full">
        <label class="form-label" for="documentCommentInput">{{ 'COMMENT' | translate }}</label>
        <textarea id="documentCommentInput" class="form-control" formControlName="comment" rows="4"></textarea>
        <div class="text-danger"
          *ngIf="commentForm.get('comment').touched && commentForm.get('comment').hasError('required')">
          {{ 'COMMENT_IS_REQUIRED' | translate }}
        </div>
      </div>
    </form>
    </div>
  </mat-dialog-content>

  <div mat-dialog-actions align="end" class="dms-form-dialog__actions">
    <button type="button" class="dms-form-dialog__btn dms-form-dialog__btn--cancel" (click)="closeDialog()">
      <i-feather name="x-circle"></i-feather>
      {{ 'CANCEL' | translate }}
    </button>
    <button type="button" class="dms-form-dialog__btn dms-form-dialog__btn--save" (click)="addComment()">
      <i-feather name="send"></i-feather>
      {{ 'ADD_COMMENT' | translate }}
    </button>
  </div>
</div>
