<div class="dms-form-dialog__shell">
  <div class="dms-form-dialog__header">
    <div class="dms-form-dialog__heading">
      <h2 class="dms-form-dialog__title">{{ 'SEND_EMAIL' | translate }}</h2>
      <app-page-help-text code="SEND_EMAIL"></app-page-help-text>
    </div>
    <button type="button" class="dms-form-dialog__close" (click)="closeDialog()" [attr.aria-label]="'CANCEL' | translate">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <mat-dialog-content class="dms-form-dialog__body">
    <div class="dms-form-dialog__form-card">
      <form [formGroup]="emailForm">
        <div class="dms-form-dialog__form-grid">
          <div class="dms-form-dialog__field dms-form-dialog__field--full">
            <label class="form-label">{{ 'TO' | translate }}</label>
            <input formControlName="toAddress" type="email" class="form-control" placeholder="{{ 'EMAIL' | translate }}">
            <div class="text-danger" *ngIf="emailForm.get('toAddress').touched && emailForm.get('toAddress').hasError('required')">
              {{ 'TO_ADDRESS_IS_REQUIRED' | translate }}
            </div>
            <div class="text-danger" *ngIf="emailForm.get('toAddress').touched && emailForm.get('toAddress').hasError('email')">
              {{ 'EMAIL_IS_NOT_PROPER_FORMAT' | translate }}
            </div>
          </div>

          <div class="dms-form-dialog__field dms-form-dialog__field--full">
            <label class="form-label">{{ 'SUBJECT' | translate }}</label>
            <input formControlName="subject" type="text" class="form-control" placeholder="{{ 'SUBJECT' | translate }}">
            <div class="text-danger" *ngIf="emailForm.get('subject').touched && emailForm.get('subject').hasError('required')">
              {{ 'SUBJECT_IS_REQUIRED' | translate }}
            </div>
          </div>

          <div class="dms-form-dialog__field dms-form-dialog__field--full">
            <label class="form-label">{{ 'BODY' | translate }}</label>
            <div class="NgxEditor__Wrapper">
              <ckeditor [editor]="editor" [config]="{ toolbar: [ 'heading', '|', 'bold', 'italic' ] }"
                formControlName="body"></ckeditor>
            </div>
            <div class="text-danger" *ngIf="emailForm.get('body').touched && emailForm.get('body').hasError('required')">
              {{ 'BODY_IS_REQUIRED' | translate }}
            </div>
          </div>

          <div class="dms-form-dialog__field dms-form-dialog__field--full">
            <label class="form-label">{{ 'ATTACHMENT_DOCUMENT' | translate }}</label>
            <div class="dms-form-dialog__readonly-file">{{ data?.name }}</div>
          </div>
        </div>
      </form>
    </div>
  </mat-dialog-content>

  <div mat-dialog-actions class="dms-form-dialog__actions">
    <button type="button" class="dms-form-dialog__btn dms-form-dialog__btn--cancel" (click)="closeDialog()">
      <i-feather name="x-circle"></i-feather>
      {{ 'CANCEL' | translate }}
    </button>
    <button type="button" class="dms-form-dialog__btn dms-form-dialog__btn--save" (click)="sendEmail()">
      <i-feather name="send"></i-feather>
      {{ 'SEND' | translate }}
    </button>
  </div>
</div>
