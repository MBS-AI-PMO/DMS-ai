<div class="dms-form-dialog__shell">
  <div class="dms-form-dialog__header">
    <div class="dms-form-dialog__heading">
      <h2 class="dms-form-dialog__title">{{ 'UPLOAD_NEW_VERSION_FILE' | translate }}</h2>
      <app-page-help-text code="UPLOAD_NEW_VERSION"></app-page-help-text>
    </div>
    <button type="button" class="dms-form-dialog__close" (click)="closeDialog()" [attr.aria-label]="'CANCEL' | translate">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <mat-dialog-content class="dms-form-dialog__body">
    <div class="dms-form-dialog__form-card">
      <form [formGroup]="documentForm">
        <div class="dms-form-dialog__field dms-form-dialog__field--full">
          <label class="form-label">{{ 'DOCUMENT_UPLOAD' | translate }}</label>
          <input class="form-control" #file (change)="upload(file.files)" type="file" />
          <div class="text-danger" *ngIf="documentForm.get('url').touched && documentForm.get('url').errors?.['required']">
            {{ 'DOCUMENT_IS_REQUIRED' | translate }}
          </div>
          <div *ngIf="(documentForm.get('extension').touched || documentForm.get('extension').dirty) && documentForm.get('extension').errors && !documentForm.get('url').errors?.['required']">
            <div class="text-danger" *ngIf="documentForm.get('extension').errors?.['required']">
              {{ 'DOCUMENT_TYPE_IS_NOT_ALLOWED' | translate }}
            </div>
          </div>
        </div>

        <div class="dms-form-dialog__field dms-form-dialog__field--full" *ngIf="showProgress">
          <mat-progress-bar mode="determinate" [value]="progress"></mat-progress-bar>
        </div>
      </form>
    </div>
  </mat-dialog-content>

  <div mat-dialog-actions class="dms-form-dialog__actions">
    <button type="button" class="dms-form-dialog__btn dms-form-dialog__btn--cancel" (click)="closeDialog()">
      <i-feather name="x-circle"></i-feather>
      {{ 'CANCEL' | translate }}
    </button>
    <button type="button" class="dms-form-dialog__btn dms-form-dialog__btn--save" (click)="SaveDocument()" cdkFocusInitial>
      <i-feather name="save"></i-feather>
      {{ 'SAVE' | translate }}
    </button>
  </div>
</div>
