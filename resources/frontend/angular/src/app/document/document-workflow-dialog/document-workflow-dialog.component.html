<div class="dms-form-dialog__shell">
  <div class="dms-form-dialog__header">
    <div class="dms-form-dialog__heading">
      <h2 class="dms-form-dialog__title">{{ 'START_WORKFLOW' | translate }}</h2>
      <app-page-help-text [code]="'MANAGE_WORKFLOW'"></app-page-help-text>
    </div>
    <button type="button" class="dms-form-dialog__close" (click)="closeDialog()" [attr.aria-label]="'CANCEL' | translate">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <mat-dialog-content class="dms-form-dialog__body">
    <div class="dms-form-dialog__form-card">
      <form [formGroup]="documentworkflowForm">
        <div class="dms-form-dialog__field dms-form-dialog__field--full">
          <label class="form-label">
            {{ 'WORKFLOW' | translate }}
            <i-feather name="refresh-cw" title="Refresh" (click)="workflowStore.loadWorkflows()"
              class="ms-1 cursor-pointer text-primary medium-icon"></i-feather>
          </label>
          <input type="text" class="form-control" placeholder="{{ 'NONE' | translate }}" aria-label="Workflow"
            matInput formControlName="workflowName" [matAutocomplete]="auto">
          <mat-autocomplete autoActiveFirstOption #auto="matAutocomplete"
            (optionSelected)="onWorkflowSelected($event.option.value)">
            @for (option of filteredWorkflows | async; track option) {
            <mat-option [value]="option.name">{{ option.name }}</mat-option>
            }
          </mat-autocomplete>
          <div *ngIf="documentworkflowForm.get('workflowId').touched && documentworkflowForm.get('workflowId').errors">
            <div class="text-danger" *ngIf="documentworkflowForm.get('workflowId').errors?.['required']">
              {{ 'SELECT_WORKFLOW' | translate }}
            </div>
          </div>
        </div>
      </form>
    </div>
  </mat-dialog-content>

  <div mat-dialog-actions class="dms-form-dialog__actions">
    <button type="button" class="dms-form-dialog__btn dms-form-dialog__btn--cancel" (click)="closeDialog()">
      <i-feather name="x-circle"></i-feather>
      {{ 'CANCEL' | translate }}
    </button>
    <button type="button" class="dms-form-dialog__btn dms-form-dialog__btn--save" (click)="saveWorkflowInstance()" cdkFocusInitial>
      <i-feather name="save"></i-feather>
      {{ 'SAVE' | translate }}
    </button>
  </div>
</div>
