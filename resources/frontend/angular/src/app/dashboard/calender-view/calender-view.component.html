<div class="calendar-panel">
  <div class="calendar-panel__header">
    <h2 class="calendar-panel__title">
      {{ 'REMINDERS' | translate }}
      <app-page-help-text code="REMINDERS"></app-page-help-text>
    </h2>
  </div>

  <div class="calendar-panel__toolbar">
    <h3 class="calendar-panel__month">{{ viewDate | calendarDate:(view + 'ViewTitle'):'en' }}</h3>
    <div class="calendar-nav">
      <button [disabled]="isProcessing" class="calendar-nav__btn" mwlCalendarPreviousView [view]="view"
        [(viewDate)]="viewDate" (viewDateChange)="viewDateChange($event)">
        <i-feather name="chevron-left" class="small-icon"></i-feather>
      </button>
      <button [disabled]="isProcessing" class="calendar-nav__btn calendar-nav__btn--today"
        (viewDateChange)="viewDateChange($event)" mwlCalendarToday [(viewDate)]="viewDate">
        {{ 'TODAY' | translate }}
      </button>
      <button [disabled]="isProcessing" class="calendar-nav__btn" mwlCalendarNextView [view]="view"
        [(viewDate)]="viewDate" (viewDateChange)="viewDateChange($event)">
        <i-feather name="chevron-right" class="small-icon"></i-feather>
      </button>
    </div>
  </div>

  <div class="calendar-panel__body" [class.calendar-panel__body--loading]="isProcessing">
    <div class="calendar-loading" *ngIf="isProcessing">
      <div class="calendar-loading__spinner"></div>
    </div>

    <div [ngSwitch]="view">
      <mwl-calendar-month-view *ngSwitchCase="CalendarView.Month" [viewDate]="viewDate" [events]="events"
        [activeDayIsOpen]="activeDayIsOpen" (dayClicked)="dayClicked($event.day)"
        (eventClicked)="handleEvent('Clicked', $event.event)">
      </mwl-calendar-month-view>
    </div>
  </div>
</div>
