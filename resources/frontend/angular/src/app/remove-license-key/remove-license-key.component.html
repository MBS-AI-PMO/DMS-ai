<div class="d-flex align-items-center justify-content-center vh-100">
  <div class="text-center">
    <div class="row align-items-center">
      <span class="mb-0 page-title">
        Deactivate License for this Domain
      </span>
    </div>
    <div class="card">
      <div class="header">
        <div class="row">
          <div class="body">
            <div class="row">
              <div class="col-md-12">
                <ul class="list-group">
                  <li class="list-group-item">
                    <span class="text-dark text-bold">
                      This action will remove the current activation token from this installation.
                    </span>
                  </li>
                </ul>
              </div>
            </div>
            <div class="row mt-3">
              <div class="col-md-12">
                <button type="button" class="btn btn-danger btn-sm" (click)="onDeactiveLicense()">
                  Deactivate License
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
