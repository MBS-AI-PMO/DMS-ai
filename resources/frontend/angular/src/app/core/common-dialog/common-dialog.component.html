<div class="dms-confirm">
  <div class="dms-confirm__header">
    <span aria-hidden="true"></span>
    <button type="button" class="dms-confirm__close" (click)="closeDialog()" [attr.aria-label]="'CANCEL' | translate">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="dms-confirm__body">
    <div class="dms-confirm__icon-wrap" aria-hidden="true">
      <i-feather name="trash-2" class="dms-confirm__icon-feather"></i-feather>
    </div>
    <h2 class="dms-confirm__title">{{ primaryMessage }}</h2>
    <p class="dms-confirm__subtitle" *ngIf="secondaryMessage">{{ secondaryMessage }}</p>
  </div>

  <div mat-dialog-actions class="dms-confirm__actions">
    <button type="button" class="dms-confirm__btn dms-confirm__btn--cancel" (click)="clickHandler(false)">
      {{ 'CANCEL' | translate }}
    </button>
    <button type="button" class="dms-confirm__btn dms-confirm__btn--confirm" (click)="clickHandler(true)">
      <i-feather name="check"></i-feather>
      {{ 'YES' | translate }}
    </button>
  </div>
</div>
